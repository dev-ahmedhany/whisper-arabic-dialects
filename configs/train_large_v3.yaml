# QLoRA fine-tune of whisper-large-v3 (1.55B). Larger decoder than turbo;
# need slightly more headroom and grad checkpointing fits cleaner on L4.

model_name: "openai/whisper-large-v3"
language: "arabic"
task: "transcribe"
attn_implementation: "flash_attention_2"

train_jsonl: "test_sets/train.jsonl"
val_jsonl: "test_sets/val.jsonl"

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules: ["q_proj", "v_proj", "k_proj", "out_proj", "fc1", "fc2"]

per_device_train_batch_size: 4
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
warmup_ratio: 0.1
num_train_epochs: 3
optim: "paged_adamw_8bit"
gradient_checkpointing: true

eval_steps: 500
save_steps: 500
save_total_limit: 3
logging_steps: 25
generation_max_length: 225
seed: 42

output_dir: "checkpoints/whisper-large-v3-ar-lora"
run_name: "whisper-large-v3-ar-lora-v1"
report_to: ["tensorboard", "wandb"]
wandb_project: "whisper-arabic-ft"
wandb_tags: ["large-v3", "qlora", "milestone-2"]

# Headline matrix — fast first-pass that fills the production-recommendation rows
# in paper Table 6. Only beam=1 + int8 variants × all dialects × both ZS models.
# Designed to complete in ~30-60 min across 3 c3-standard-8 shards so the paper
# has real numbers to land before the slower fp32/beam=5 sweeps.
#
# Once these results are in, run benchmark_matrix_quality.yaml separately
# (with --max-samples capped) for the fp32/beam=5 ceiling rows of Table 1.

axis: "headline"

models:
  - name: "zero-shot-large-v3"
    path: "Systran/faster-whisper-large-v3"
  - name: "zero-shot-turbo"
    path: "deepdml/faster-whisper-large-v3-turbo-ct2"
  - name: "ft-turbo"
    path: "whisper-faster-turbo-ar-{compute_type}"
  - name: "ft-large-v3"
    path: "whisper-faster-large-v3-ar-{compute_type}"

compute_types: ["int8", "int8_float32"]
beam_sizes: [1]
cpu_threads: [4]

test_sets:
  - { dialect: "msa",       path: "test_sets/test_msa_fleurs_msa_test.jsonl" }
  - { dialect: "egyptian",  path: "test_sets/test_egyptian_casablanca_egyptian_test.jsonl" }
  - { dialect: "levantine", path: "test_sets/test_levantine_casablanca_levantine_test.jsonl" }
  - { dialect: "gulf",      path: "test_sets/test_gulf_casablanca_gulf_test.jsonl" }
  - { dialect: "maghrebi",  path: "test_sets/test_maghrebi_casablanca_maghrebi_test.jsonl" }

# QLoRA fine-tune of whisper-small (244M) on dialect-balanced Arabic.
# Edge-deployment-oriented: small enough to fit <600 MB RAM at int8 inference.

model_name: "openai/whisper-small"
language: "arabic"
task: "transcribe"
attn_implementation: "flash_attention_2"

train_jsonl: "test_sets/train.jsonl"
val_jsonl: "test_sets/val.jsonl"

# LoRA — same modules as turbo/large-v3; smaller model means LoRA covers a
# larger fraction of total params (~2-3% vs ~1% for large-v3).
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules: ["q_proj", "v_proj", "k_proj", "out_proj", "fc1", "fc2"]

# Optimization — small fits comfortably on L4 with batch 16
per_device_train_batch_size: 16
per_device_eval_batch_size: 8
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
warmup_ratio: 0.1
num_train_epochs: 3
optim: "paged_adamw_8bit"
gradient_checkpointing: false

eval_steps: 500
save_steps: 500
save_total_limit: 3
logging_steps: 25
generation_max_length: 225
seed: 42

output_dir: "checkpoints/whisper-small-ar-lora"
run_name: "whisper-small-ar-lora-v1"
report_to: ["tensorboard", "wandb"]
wandb_project: "whisper-arabic-ft"
wandb_tags: ["small", "qlora", "edge-candidate"]

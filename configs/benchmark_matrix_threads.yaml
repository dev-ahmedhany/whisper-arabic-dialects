# Thread scaling (axis 4): best config × {1, 2, 4, 8} threads × MSA only.
# Question: how does each model scale with cores?

axis: "threads"

models:
  - name: "ft-turbo"
    path: "whisper-faster-turbo-ar-{compute_type}"
  - name: "ft-large-v3"
    path: "whisper-faster-large-v3-ar-{compute_type}"

compute_types: ["int8_float32"]
beam_sizes: [1]
cpu_threads: [1, 2, 4, 8]

test_sets:
  - { dialect: "msa", path: "test_sets/test_msa_fleurs_msa_test.jsonl" }

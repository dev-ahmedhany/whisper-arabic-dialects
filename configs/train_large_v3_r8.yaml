# QLoRA fine-tune of whisper-large-v3 (full, 1.55B) on the v2
# Casablanca-domain-matched mix. Same r=8 LoRA recipe as v2-turbo
# (verified to survive CT2 int8 quantization, paper §6.5) — only the
# base model changes, isolating the "bigger base" effect.
#
# Targets the "best WER ever" headline alongside the production-Pareto
# turbo row from v2.

model_name: "openai/whisper-large-v3"
language: "arabic"
task: "transcribe"
attn_implementation: "sdpa"

train_jsonl: "test_sets/train_v3.jsonl"
val_jsonl: "test_sets/val_v3.jsonl"

# LoRA — identical to v2-turbo r=8 (int8-safe per §6.5)
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules: ["q_proj", "v_proj", "k_proj", "out_proj", "fc1", "fc2"]

# Optimization — smaller per-device batch than turbo to fit large-v3
# (32 decoder layers vs 4) on a single 24 GB L4 with grad checkpointing.
per_device_train_batch_size: 4
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4   # effective batch 16, matches v2-turbo
learning_rate: 1.0e-4
warmup_ratio: 0.1
num_train_epochs: 10              # ceiling; early-stop will halt earlier
max_steps: 10000
optim: "paged_adamw_8bit"
gradient_checkpointing: true     # mandatory at large-v3 scale on 24GB

# Early stopping disabled with eval_strategy=no (no metric to gate on).
# Pick best checkpoint manually post-hoc from runs/results.jsonl rows
# written by the external CPU eval poller.
# early_stopping_patience: 4
# early_stopping_threshold: 0.001

# Schedule / logging
# v3 resume (2026-05-01): switching to no-eval + checkpoints every 250 steps,
# with eval running externally on the same L4 box's CPU (see
# /tmp/checkpoint_eval_poller.py). Trade-off: lose Trainer's early-stop
# (since metric_for_best_model needs eval), but gain ~70% GPU duty cycle.
eval_strategy: "no"
eval_steps: 250
save_steps: 250
# 40 ckpts × ~110MB (LoRA only) = ~4.4 GB local — well within L4 disk.
# With max_steps=10000 + save_steps=250 = up to 40 saves total, so 40
# means "keep them all." Earlier 12 caused us to lose ckpts 500-5500
# (recovered via HF revision history, but the local copies were gone).
save_total_limit: 40
load_best_model_at_end: false
logging_steps: 25
generation_max_length: 225
seed: 42

output_dir: "checkpoints/whisper-large-v3-ar-lora"
run_name: "whisper-large-v3-ar-lora-v3"
report_to: ["tensorboard", "wandb"]
wandb_project: "whisper-arabic-ft"
wandb_tags: ["large-v3", "qlora", "v3-best-wer"]

# Push every saved checkpoint to a NEW HF repo so a machine outage can't lose
# weights. Per memory/hf_versioning.md — never overwrite an existing repo.
push_to_hub: true
hub_model_id: "dev-ahmedhany/whisper-large-v3-arabic-ft-v3-lora"
hub_strategy: "every_save"
hub_private_repo: false

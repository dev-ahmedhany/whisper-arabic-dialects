# Dialect-balanced training mix. Hours per dialect should sit within ~2× of each other.
# `sources` are paths to per-dataset JSONL files produced by scripts/prepare_*.py.
# Test sources are NOT mixed into train; data_prep.py copies them through verbatim.
#
# All sources are accessible via HuggingFace Hub without external registration:
#   common_voice_18 (MohamedRashad/common-voice-18-arabic)  — MSA, CV18 community mirror
#   mgb3            (ArabicSpeech/MGB-3)                    — Egyptian
#   mgb5            (ArabicSpeech/MGB-5)                    — Maghrebi
#   masc            (pain/MASC)                             — Levantine
#   fleurs          (google/fleurs)                         — MSA test
#   casablanca      (MBZUAI-Paris/Casablanca)               — multi-dialect test
#
# Note: Gulf is intentionally absent from the training mix. SADA's audio is not
# available on HF Hub (metadata-only mirrors; full corpus is on Kaggle ~600 GB,
# infeasible for our pipeline). We still benchmark Gulf on the held-out
# Casablanca test set; the result is a cross-dialect transfer measurement.

train:
  msa:
    hours: 12
    sources:
      - "test_sets/common_voice_18_ar_train.jsonl"
  egyptian:
    hours: 10
    sources:
      - "test_sets/mgb3_egyptian_train.jsonl"
  maghrebi:
    hours: 10
    sources:
      - "test_sets/mgb5_moroccan_train.jsonl"
  levantine:
    hours: 9
    sources:
      - "test_sets/masc_levantine_train.jsonl"

test:
  msa:
    sources:
      - "test_sets/fleurs_msa_test.jsonl"   # Casablanca has no MSA section
  egyptian:
    sources:
      - "test_sets/casablanca_egyptian_test.jsonl"   # Egypt config
  levantine:
    sources:
      - "test_sets/casablanca_levantine_test.jsonl"  # Jordan config
  gulf:
    sources:
      - "test_sets/casablanca_gulf_test.jsonl"       # UAE config
  maghrebi:
    sources:
      - "test_sets/casablanca_maghrebi_test.jsonl"   # Morocco config
